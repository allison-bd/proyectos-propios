<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors">
<nav class="bg-red-600 border-b-4 border-black">
    <div class="flex flex-wrap items-center justify-between px-4 md:px-8 py-4 gap-3">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-white border-2 border-black flex items-center justify-center">
                <div class="w-4 h-4 bg-red-600"></div>
            </div>
            <h1 class="text-white font-bold text-xl md:text-2xl">Pokédex</h1>
        </div>
        <form id="formulario-busqueda" class="w-full sm:w-auto sm:flex-1 sm:max-w-[16rem] order-3 sm:order-none">
            <div class="bg-white dark:bg-gray-800 border-2 border-black dark:border-gray-500 px-3 py-2 flex items-center gap-2">
                <span class="text-gray-400">▶</span>
                <input id="buscador" type="search" placeholder="Buscar Pokémon..." class="w-full outline-none text-sm bg-transparent text-black dark:text-white dark:placeholder-gray-400">
            </div>
        </form>
        <div class="flex items-center gap-2">
            <button id="boton-tema" class="bg-yellow-400 border-2 border-black w-10 h-10 flex items-center justify-center text-xl">☾</button>
            <button id="boton-favoritos" class="bg-white dark:bg-gray-800 dark:text-white border-2 border-black dark:border-gray-500 px-3 py-2 font-bold text-sm flex items-center gap-1">
                ❤ FAV <span id="contador-favoritos" class="bg-red-600 text-white px-2">0</span>
            </button>
        </div>
    </div>
</nav>

<main>
    <div id="filtro-tipos" class="flex flex-wrap gap-2 px-4 md:px-8 py-3"></div>
    <section id="lista-pokemon" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 px-4 md:px-8 py-4"></section>
</main>

<footer id="paginacion" class="flex justify-center items-center gap-4 mt-6 mb-6">
    <button id="pagina-anterior" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 dark:text-white rounded-lg disabled:opacity-40">Anterior</button>
    <span id="pagina-actual-texto" class="text-sm text-gray-600 dark:text-gray-300"></span>
    <button id="pagina-siguiente" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 dark:text-white rounded-lg disabled:opacity-40">Siguiente</button>
</footer>

<div id="modal-detalle" class="hidden fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-2 md:p-4 overflow-y-auto">
    <div class="bg-gray-500 border-4 border-black p-1.5 w-full max-w-[32rem]">
        <div class="bg-white dark:bg-gray-800 border-2 border-black">
            <div id="modal-imagen-contenedor" class="h-40 flex items-center justify-center relative">
                <button id="cerrar-modal" class="absolute top-2 right-2 bg-black text-white w-6 h-6 flex items-center justify-center text-sm">✖</button>
                <img id="modal-imagen" src="" alt="" class="w-32 h-32">
            </div>
            <div class="bg-amber-50 dark:bg-gray-800 p-4 border-t-4 border-black">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h2 id="modal-nombre" class="font-bold text-xl capitalize text-gray-900 dark:text-white"></h2>
                        <p id="modal-numero" class="text-xs text-gray-500 dark:text-gray-400"></p>
                    </div>
                    <div id="modal-tipos" class="flex gap-2"></div>
                </div>

                <div class="border-t-2 border-dashed border-gray-400 dark:border-gray-600 mb-3"></div>

                <p id="modal-descripcion" class="text-sm text-gray-700 dark:text-gray-300 mb-3 text-justify"></p>

                <p class="font-bold text-xs mb-1 text-gray-900 dark:text-white">. HABILIDADES</p>
                <div id="modal-habilidades" class="flex flex-wrap gap-2 mb-3"></div>

                <p class="font-bold text-xs mb-1 text-gray-900 dark:text-white">. ESTADÍSTICAS BASE</p>
                <div id="modal-estadisticas" class="mb-3"></div>

                <p class="font-bold text-xs mb-1 text-gray-900 dark:text-white">. LÍNEA EVOLUTIVA</p>
                <div id="modal-linea-evolutiva" class="flex flex-wrap items-center justify-center gap-2"></div>
            </div>
        </div>
    </div>
</div>

<div id="drawer-favoritos" class="hidden fixed inset-0 bg-black/50 z-50">
    <div class="bg-white dark:bg-gray-800 border-r-4 border-black w-72 h-full flex flex-col">
        <div class="bg-red-600 border-b-4 border-black p-4 flex items-center justify-between">
            <h2 class="text-white font-bold text-sm">♥ MIS FAVORITOS <span id="drawer-contador" class="bg-white text-red-600 px-2">0</span></h2>
            <button id="cerrar-drawer" class="bg-black text-white w-6 h-6 flex items-center justify-center text-sm">✖</button>
        </div>
        <div id="lista-favoritos" class="flex-1 overflow-y-auto p-4"></div>
    </div>
</div>

<div id="notificacion" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white border-2 border-white px-4 py-2 text-sm z-50"></div>

<script type="module" src="./assets/js/app.js"></script>
</body>
</html>
